spring:
  application:
    name: payment_backend

  main:
    banner-mode: off

  ai:
    mcp:
      server:
        name: payment-ops-mcp-server
        version: 1.0.0
        type: SYNC
        instructions: >-
          Read-only payment operations: look up payment status, find stuck payments,
            and run full failure triage (diagnosis, network rules, and a proposed
            remediation plan). Proposes actions but cannot execute refunds or captures.
        capabilities:
          tool: true
      client:
        request-timeout: 20s  # bounds each MCP tool call (the npx stdio server)
        stdio:
          connections:
            github:
              command: npx
              args: [ "-y", "@modelcontextprotocol/server-github" ]
              env:
                GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:30b
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.9

    vectorstore:
      pgvector:
        initialize-schema: true

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            table-name: chat_memory

  datasource:
    url: jdbc:postgresql://localhost:5432/pgvector_payment
    username: pallavisharma
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

app:
  incident:
    owner: pallavi-sharma18
    repo: github-mcp-payment-backend

resilience4j:
  retry:
    instances:
      llm:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2          # 1s, 2s, 4s
        enable-randomized-wait: true               # jitter — avoids the thundering herd
        randomized-wait-factor: 0.5
        retry-exceptions:                          # ONLY transient faults (what openai-java throws)
          - com.openai.errors.OpenAIIoException       # network error / timeout
          - com.openai.errors.RateLimitException      # 429
          - com.openai.errors.InternalServerException # 5xx
        ignore-exceptions:                         # NEVER retry these
          - com.openai.errors.BadRequestException        # 400
          - com.openai.errors.UnauthorizedException      # 401
          - com.openai.errors.PermissionDeniedException  # 403
          - com.openai.errors.NotFoundException          # 404
          - com.openai.errors.UnprocessableEntityException # 422
  circuitbreaker:
    instances:
      llm:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50                 # open at 50% failures
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      mcpGithub:                                   # separate breaker for the MCP server
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers, retries, retryevents, circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  file:
    name: ./payment_backend.log
  level:
    org.springframework.ai.chat.client: DEBUG
    io.github.resilience4j: DEBUG